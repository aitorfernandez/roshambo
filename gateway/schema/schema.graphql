type Account {
  id: ID!
  email: String!
  profile: Profile
}

type Profile {
  accountID: ID!
  avatar: String
  username: String
}

type ValidateTokenPayload {
  id: ID!
  jwt: String!
}

input ValidateTokenInput {
  id: ID!
  token: String!
}

type Query {
  account(id: ID!): Account!
}

type Mutation {
  getStarted(email: String!): Boolean!

  validateToken(input: ValidateTokenInput!): ValidateTokenPayload!
}

schema {
  query: Query
  mutation: Mutation
}
